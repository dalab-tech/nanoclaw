name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        type: choice
        options:
          - gcp
          - oci
          - both
        default: gcp
      tenant:
        description: OS username to deploy as
        type: string
        default: anton
  repository_dispatch:
    types: [nanoclaw-updated]

permissions:
  id-token: write
  contents: read

jobs:
  deploy-gcp:
    # GCP: SSH as SA user (OS Login, has sudo), delegate to tenant via sudo -u
    if: >-
      github.event_name == 'repository_dispatch' ||
      inputs.target == 'gcp' || inputs.target == 'both'
    runs-on: ubuntu-latest
    environment: gcp
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/deploy-remote.sh
            infra/status.sh
          sparse-checkout-cone-mode: false

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CICD_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy
        run: |
          TENANT="${{ inputs.tenant || 'anton' }}"
          VM="${{ vars.GCP_VM_INSTANCE_NAME }}"
          ZONE="${{ vars.GCP_ZONE }}"
          GCP_SSH="gcloud compute ssh ${VM} --zone=${ZONE} --tunnel-through-iap"

          # Write .env as tenant (SA user has sudo)
          $GCP_SSH \
            --command="sudo -u $TENANT bash -c 'mkdir -p ~/nanoclaw && cat > ~/nanoclaw/.env && chmod 600 ~/nanoclaw/.env'" \
            <<< "$NANOCLAW_DOTENV"

          # Deploy status script to tenant's ~/.local/bin/
          $GCP_SSH \
            --command="sudo -u $TENANT bash -c 'mkdir -p ~/.local/bin && cat > ~/.local/bin/status && chmod +x ~/.local/bin/status'" \
            < infra/status.sh

          # Run deploy (deploy-remote.sh auto-detects admin mode, uses sudo -u)
          REPO_URL="https://github.com/${{ github.repository }}.git"
          $GCP_SSH \
            --command="TENANT=$TENANT REPO_URL=$REPO_URL bash -s" \
            < scripts/deploy-remote.sh
        env:
          NANOCLAW_DOTENV: ${{ secrets.NANOCLAW_DOTENV }}

  deploy-oci:
    # OCI: SSH as tenant directly (no sudo needed)
    if: >-
      github.event_name == 'repository_dispatch' ||
      inputs.target == 'oci' || inputs.target == 'both'
    runs-on: ubuntu-latest
    environment: oci
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/deploy-remote.sh
            infra/status.sh
          sparse-checkout-cone-mode: false

      - name: Deploy
        run: |
          TENANT="${{ inputs.tenant || 'anton' }}"
          echo "${{ secrets.OCI_DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          OCI_SSH="ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key ${TENANT}@${{ vars.OCI_DEPLOY_HOST }}"

          # Write .env as tenant (SSH is the tenant, no sudo)
          echo "$NANOCLAW_DOTENV" | $OCI_SSH "mkdir -p ~/nanoclaw && cat > ~/nanoclaw/.env && chmod 600 ~/nanoclaw/.env"

          # Deploy status script to ~/.local/bin/
          cat infra/status.sh | $OCI_SSH "mkdir -p ~/.local/bin && cat > ~/.local/bin/status && chmod +x ~/.local/bin/status"

          # Run deploy (deploy-remote.sh auto-detects tenant mode, no sudo)
          REPO_URL="https://github.com/${{ github.repository }}.git"
          cat scripts/deploy-remote.sh | $OCI_SSH "TENANT=$TENANT REPO_URL=$REPO_URL bash -s"

          rm -f /tmp/deploy_key
        env:
          NANOCLAW_DOTENV: ${{ secrets.NANOCLAW_DOTENV }}
