name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        type: choice
        options:
          - gcp
          - oci
          - both
        default: gcp
  repository_dispatch:
    types: [nanoclaw-updated]

permissions:
  id-token: write
  contents: read

jobs:
  deploy-gcp:
    if: >-
      github.event_name == 'repository_dispatch' ||
      inputs.target == 'gcp' || inputs.target == 'both'
    runs-on: ubuntu-latest
    environment: gcp
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/deploy-remote.sh
          sparse-checkout-cone-mode: false

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CICD_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy via IAP tunnel
        run: |
          gcloud compute ssh ${{ vars.GCP_VM_INSTANCE_NAME }} \
            --zone=${{ vars.GCP_ZONE }} \
            --tunnel-through-iap \
            --command="$(cat scripts/deploy-remote.sh)"

  deploy-oci:
    if: >-
      github.event_name == 'repository_dispatch' ||
      inputs.target == 'oci' || inputs.target == 'both'
    runs-on: ubuntu-latest
    environment: oci
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/deploy-remote.sh
          sparse-checkout-cone-mode: false

      - name: Deploy via SSH
        run: |
          echo "${{ secrets.OCI_DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -o StrictHostKeyChecking=no \
            -i /tmp/deploy_key \
            ${{ vars.OCI_DEPLOY_USER }}@${{ vars.OCI_DEPLOY_HOST }} \
            "$(cat scripts/deploy-remote.sh)"
          rm -f /tmp/deploy_key
