# Deploy NanoClaw to a remote server via SSH.
# Disabled by default — runs only via manual workflow_dispatch.
# To enable on push to main, uncomment the push trigger below.
name: Deploy

on:
  workflow_dispatch:
  # push:
  #   branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER || 'ubuntu' }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH || '~/nanoclaw' }}

            # Stash local changes, pull, restore
            git stash --include-untracked 2>/dev/null || true
            git pull --rebase origin main
            git stash pop 2>/dev/null || true

            # Install deps and build
            npm install
            npm run build

            # Rebuild container if Dockerfile changed
            if git diff HEAD~1 --name-only | grep -q 'container/'; then
              echo "Container files changed, rebuilding..."
              ./container/build.sh
            fi

            # Restart service
            systemctl --user restart nanoclaw
            echo "Deploy complete"
